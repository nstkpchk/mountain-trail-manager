<div class="details-container">
  
  <div class="mountain-header" *ngIf="mountain">
    <h1>{{ mountain.name }}</h1>
    
    <button class="back-btn" (click)="goBack()">← Back to Mountains List</button>
  </div>

  <div class="trails-section">
    <div class="trails-header-row">
      <h3>Available Trails</h3>
      <button class="add-trail-btn" (click)="goToAddTrail()">+ Add New Trail</button>
    </div>

    <ul class="trails-list" *ngIf="trails && trails.length > 0; else noTrails">
      <li *ngFor="let trail of trails" class="trail-item">
        
        <span class="trail-name">{{ trail.name }}</span>
        
        <div class="actions-group">
          <button class="action-btn btn-details" (click)="goToTrailDetails(trail.id)">Details</button>
          <button class="action-btn btn-edit" (click)="goToEditTrail(trail.id)">Edit</button>
          <button class="action-btn btn-delete" (click)="deleteTrail(trail.id)">Delete</button>
        </div>

      </li>
    </ul>

    <ng-template #noTrails>
      <div class="no-data">
        This mountain doesn't have any trails assigned yet.
      </div>
    </ng-template>
  </div>

</div>
