<div class="edit-container">
  <h2>Edit Mountain</h2>

  <form [formGroup]="mountainForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="name">Name:</label>
      <input id="name" type="text" formControlName="name" placeholder="Enter mountain name">

      <div *ngIf="mountainForm.controls['name'].invalid && mountainForm.controls['name'].touched" class="error-msg">
        Name is required!
      </div>
    </div>

    <button type="submit" class="save-btn" [disabled]="mountainForm.invalid">Save Changes</button>
  </form>
</div>
