<div class="edit-container">
  <h2>Edytuj szlak</h2>

  <form [formGroup]="trailForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="name">Nazwa:</label>
      <input id="name" formControlName="name" placeholder="Wpisz nazwę szlaku">
      
      <div *ngIf="trailForm.controls['name'].invalid && trailForm.controls['name'].touched" class="error-msg">
        Nazwa jest wymagana!
      </div>
    </div>

    <div class="form-group">
      <label for="difficulty">Trudność:</label>
      <input id="difficulty" formControlName="difficulty" placeholder="Wpisz trudność szlaku (np. EASY)">
      
      <div *ngIf="trailForm.controls['difficulty'].invalid && trailForm.controls['difficulty'].touched" class="error-msg">
          Trudność jest wymagana!
      </div>
    </div>

    <button type="submit" class="save-btn" [disabled]="trailForm.invalid">Zapisz zmiany</button>
  </form>
</div>
