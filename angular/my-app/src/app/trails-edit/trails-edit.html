<div class="edit-container">
  <h2>Edit Trail</h2>

  <form [formGroup]="trailForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="name">Name:</label>
      <input id="name" formControlName="name" placeholder="Enter trail name">
      
      <div *ngIf="trailForm.controls['name'].invalid && trailForm.controls['name'].touched" class="error-msg">
        Name is required!
      </div>
    </div>

    <div class="form-group">
      <label for="difficulty">Difficulty:</label>
      <input id="difficulty" formControlName="difficulty" placeholder="Enter trail difficulty (e.g., EASY)">
      
      <div *ngIf="trailForm.controls['difficulty'].invalid && trailForm.controls['difficulty'].touched" class="error-msg">
          Difficulty is required!
      </div>
    </div>

    <button type="submit" class="save-btn" [disabled]="trailForm.invalid">Save Changes</button>
  </form>
</div>
