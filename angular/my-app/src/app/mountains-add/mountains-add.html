<div class="add-container">
  <h2>Add new Mountain</h2>
  
  <form [formGroup]="mountainForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="name">Mountain Name:</label>
      <input id="name" type="text" formControlName="name" placeholder="e.g., Mount Everest">
    </div>

    <button type="submit" class="submit-btn" [disabled]="mountainForm.invalid">
      Save Mountain
    </button>

  </form>
</div>
