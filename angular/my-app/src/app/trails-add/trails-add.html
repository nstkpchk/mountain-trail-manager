<div class="add-container">
  <h2>Add New Trail</h2>
  
  <form [formGroup]="trailForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="name">Trail Name:</label>
      <input id="name" formControlName="name" placeholder="E.g. Main Beskid Trail">
    </div>

    <div class="form-group">
      <label for="difficulty">Difficulty Level:</label>
      <select id="difficulty" formControlName="difficulty">
        <option value="" disabled>Select difficulty</option>
        <option value="EASY">Easy</option>
        <option value="MODERATE">Moderate</option>
        <option value="HARD">Hard</option>
      </select>
    </div>
  
    <button type="submit" class="submit-btn" [disabled]="trailForm.invalid">Add Trail</button>
  </form>
</div>
